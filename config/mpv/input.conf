# =================================================================================================
# Menu & Format Toggles
# =================================================================================================
B       script-binding quality_menu/video_formats_toggle
Alt+f   script-binding quality_menu/audio_formats_toggle

# =================================================================================================
# Subtitles & Window Management
# =================================================================================================
k       cycle_values sub-ass-override "force" "no"
x       set pause yes; set fullscreen no; set window-minimized yes

# =================================================================================================
# Quality Profile Toggles
# =================================================================================================
# Shift+n: Turn ON High Quality
N       apply-profile hq; show-text "High Quality Applied"

# Ctrl+Shift+n: Return to Standard Mode (Lower battery usage)
n       apply-profile standard; show-text "Standard Profile Applied"

# =================================================================================================
# Audio Channel Toggles
# =================================================================================================
# Ctrl+d: Force Stereo
Ctrl+d  apply-profile stereo; show-text "Stereo Audio Forced"

# Ctrl+Shift+d: Return to Auto-Safe
Ctrl+D  apply-profile nostereo; show-text "Auto-Safe Audio Applied"
